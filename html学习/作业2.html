<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登录提交</title>
    <style>
        .div1{
            width: 400px;
            height: 500px;
            border:  palevioletred dotted 5px;
            /*border-radius: 10%;*/
            border-color: bisque;
            background-image: url("../image/美女.jpeg");
            background-position: right;
            margin: auto;
            border-radius: 5%;
        }
        .p1{
            width: 100px;
            height: 40px;
            border: 1px blue solid;
            background-image: url("../image/孙悟空.jpg");
            /*background-position-x: 100px;*/
            /*background-position-y: 40px;*/
            /*background-position: top;*/
            border: 4px solid palegreen;
        }
        a{
            writing-mode: rl-bt;
            color: blue;
            float: right;
            text-align: right;
            text-decoration: none;
        }
        a:hover{
            font-size: 20px;
        }
        .p2{
            position: center;
            text-align: center;
        }
        button:hover{
            background-color: bisque;
        }
        button{
            width: 400px;
            height: 60px;
            background-color: aqua;
        }
        #code{
            float: right;
            width: 80px;
            margin-top: 4px;
            color: blue;
            font-size: 26px;
        }
    </style>
</head>
<body>
<form action="作业2.1.html" onsubmit="return check()">
<div class="div1">
    <span>请注册</span>&emsp;&emsp;&emsp;
    <a href="作业2.1.html"  >立即登录</a><br><br>
    <input type="text" placeholder="请输入手机号" size="45" style="height: 30px"><br><br>
    <input type="password" placeholder="请输入短信验证码" size="30" style="height: 30px">&emsp;
    <input type="button" value="发送验证码" size="45" style="height: 30px"><br><br>
    <input type="text" placeholder="请输入用户名" size="45" style="height: 30px"><br><br>
    <input type="password" placeholder="请输入密码" size="45" style="height: 30px"><br><br>
    <input type="password" placeholder="请再次输入密码" size="45" style="height: 30px"><br><br>
    <input type="text" placeholder="请输入图形验证码" size="30" style="height: 30px" id="vcode">
    <p class="p1"><span id="code">aaaa</span></p>
    <p class="p2">
        <button  type="submit" style="color: blueviolet;font-size: 30px">立即注册</button>
    </p>

</div>
</form>

<script src="https://cdn.bootcss.com/jquery/3.4.1/jquery.js"></script>
<script>
    var cd = document.getElementById('code');
    var code;
    function add() {
        var arr = '0123456789qwertyuiopasdfghjklzxcvbnmQWERTYUIOPASDFGHJKLZXCVBNM';
        // 初始化验证码
        code = '';
        for(var i=0;i<4;i++){
            var len = parseInt(Math.random()*arr.length);
            code+=arr[len];
        }
        cd.innerHTML = code;

    }
    add();
    cd.onclick = add;

    // 校验验证码
    function check() {
        var n_code = document.getElementById('vcode').value;
        if(n_code.toLowerCase() == code.toLowerCase()){
            alert('验证码正确');
            return true;
        }
        else {
            alert('验证错误');
            return false;
        }
    }


</script>
</body>
</html>
