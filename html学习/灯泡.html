<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>简单事件</title>
    <style>
        #div1{
            width: 200px;
            height: 400px;
            background-color: chartreuse;
        }
        #div2{
            border: double 2px red;
            background-color: cadetblue;
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
<select id="sel">
    <option>长沙</option>
    <option>背景</option>
    <option>河北</option>
    <option>重庆</option>
    <option>成都</option>
</select>
<div id="div2">hahaahaaha</div>
<div id="div1"></div>
    <button id="btn1">开灯</button>
<!--    <img src="../image/美女.jpeg" id="mimg">-->
    <button id="btn2">关灯</button>

<script type="text/javascript">
    var btn1 = document.getElementById('btn1');
    var btn2 = document.getElementById('btn2');
    btn1.onclick = function () {
        // document.getElementById('mimg').src='../image/美女2.jpeg';
        btn1.innerText = 'lalal';
    };
    btn2.ondblclick = function () {
        // document.getElementById('mimg').src='../image/美女.jpeg'
        alert('hahahah')
    };
    var div1 = document.getElementById('div1');
    div1.onmouseenter = function () {
        div1.style.backgroundColor = 'green';
        div1.innerText = 'lallaalal';
        div1.style.width = "400px";
    }
    div1.onmouseleave = function () {
        div1.innerText = 'byebye';
        div1.style.backgroundColor = "blue";
        div1.style.height = "200px";
    }
    window.onresize = function () {
        console.log("窗口拜年话了");
    };
    var se = document.getElementById('sel');
    se.onchange = function () {
        console.log('下拉框改变了');
    }
    var div2 = document.getElementById('div2');
    div2.onclick = function () {
        div2.style.width = "400px";
        div2.style.backgroundColor = "red";
        div2.innerText = "hengheng";
        div2.style.padding = '50px';
        div2.style.color = "white";
        console.log(div2.className);
        div2.removeAttribute("class");
        div2.setAttribute('a','a1');
        console.log(div2.hasAttribute('a'));
    }
div2.className = "lala";

</script>
</body>
</html>
