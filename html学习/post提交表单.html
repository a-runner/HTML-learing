<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>表单提交</title>
</head>
<body>
<form>
<div class="text" style="text-align: center">
<p>
    用户名:<input type="text" placeholder="请输入用户名"><br><br>
    密&emsp;码:<input type="text" placeholder="请输入密码">
</p>
<p>
    性&emsp;别:男<input type="radio" value="man" name="sex" checked="checked"> 女<input type="radio" value="woman" name="sex">
    保&emsp;密:<input type="radio" value="unknown" name="sex">
</p>
<p>
    爱&emsp;好:
        唱歌<input type="checkbox" value="sing">
        跳舞<input type="checkbox" value="dance">
        画画<input type="checkbox" value="draw">
</p>
<p>
    上传头像：<input type="file" value="选择文件">  未选择任何文件夹<br><br>
    地&emsp;址：
    <select>
        <option value="湖南">长沙市</option>
        <option value="河北">石家庄市</option>
        <option value="吉林">长春市</option>
        <option value="北京">北京市</option>
    </select><br><br>
    个人简介:<textarea rows="10"  cols="50" placeholder="有些事，明知是错的，也要去坚持，因为不甘心；有些人，明知是爱的，也要去放弃，因为没有结局；有时候，明知没路了，却还在前进，因为习惯了。"></textarea><br><br>
    <input type="submit" value="提交">&nbsp;<input type="reset" value="重置">

</p>
</div>
</form>
</body>
</html>
